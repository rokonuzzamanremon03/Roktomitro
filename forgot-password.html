<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পাসওয়ার্ড রিসেট - Roktomitro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="auth-page.css"> </head>
<body>

    <header class="header">
        <nav class="navbar">
            <a href="index.html" class="nav-logo">
                <img src="Source/logo.png" alt="Roktomitro Logo"> <span>Roktomitro</span>
            </a>
            <ul class="nav-menu">
    <li class="nav-item"><a href="index.html" class="nav-link">হোম</a></li>
    <li class="nav-item"><a href="find-blood.html" class="nav-link">দাতা খুঁজুন</a></li>
    <li class="nav-item"><a href="be-a-donor.html" class="nav-link">দাতা হোন</a></li>
    <li class="nav-item"><a href="urgent-requests.html" class="nav-link">জরুরী আবেদন</a></li> 
	<li class="nav-item"><a href="blog.html" class="nav-link">ব্লগ</a></li>
    <li class="nav-item"><a href="about-us.html" class="nav-link">আমাদের সম্পর্কে</a></li>
</ul>
            <div class="nav-right">
                <button id="login-open-btn" class="btn btn-login">লগইন</button>
                <button id="theme-toggle" class="theme-toggle-btn"><i class="fas fa-moon"></i></button>
            </div>
            <div class="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
        </nav>
    </header>

    <main class="auth-main">
        <div class="auth-container">
            <h2>পাসওয়ার্ড রিসেট</h2>
            <p class="auth-subtitle">আপনার নিবন্ধিত মোবাইল নম্বরটি লিখুন। আমরা আপনাকে একটি ভেরিফিকেশন কোড (OTP) পাঠাবো।</p>
            
            <form class="auth-form" action="reset-otp.html"> <div class="form-group">
                    <label for="reset-mobile">মোবাইল নম্বর:</label>
                    <input type="tel" id="reset-mobile" name="reset-mobile" placeholder="e.g., 017..." required>
                </div>
                <button type="submit" class="btn btn-primary">OTP পাঠান</button>
                
                <div class="auth-links">
                    <a href="#" id="back-to-login">লগইনে ফিরে যান</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2025 Roktomitro. সমস্ত স্বত্ব সংরক্ষিত।</p>
        </div>
    </footer>

    <div id="login-modal" class="modal-overlay">
        </div>

    <script src="script.js"></script> 
    <script>
        // "লগইনে ফিরে যান" লিঙ্কে ক্লিক করলে লগইন মডাল ওপেন হবে
        document.getElementById("back-to-login").addEventListener("click", (e) => {
            e.preventDefault();
            document.getElementById("login-modal").classList.add("active");
        });
    </script>
</body>
</html>
