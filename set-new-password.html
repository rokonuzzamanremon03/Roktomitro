<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নতুন পাসওয়ার্ড সেট - Roktomitro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="auth-page.css"> 
</head>
<body>
    <header class="header">
        </header>

    <main class="auth-main">
        <div class="auth-container">
            <h2>নতুন পাসওয়ার্ড দিন</h2>
            <p class="auth-subtitle">আপনার একাউন্টের জন্য একটি শক্তিশালী নতুন পাসওয়ার্ড সেট করুন।</p>
            
            <form class="auth-form" action="index.html"> <div class="form-group">
                    <label for="new-pass">নতুন পাসওয়ার্ড:</label>
                    <input type="password" id="new-pass" name="new-pass" required>
                </div>
                 <div class="form-group">
                    <label for="confirm-pass">পাসওয়ার্ড নিশ্চিত করুন:</label>
                    <input type="password" id="confirm-pass" name="confirm-pass" required>
                </div>
                <button type="submit" class="btn btn-primary">পাসওয়ার্ড সেভ করুন</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        </footer>

    <div id="login-modal" class="modal-overlay">
        </div>
    
    <script src="script.js"></script> 
</body>
</html>
